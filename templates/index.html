{% extends "base.html" %}
{% block title %}Главная{% endblock %}
{% block content %}
<h1>Товары в наличии</h1>
<div class="products-grid">
    {% for product in products %}
    <div class="product-card">
        <h3>{{ product.name }}</h3>
        <p>{{ product.price }} ₽</p>
        <a href="/product/{{ product.id }}">Подробнее</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
