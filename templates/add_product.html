{% extends "base.html" %}

{% block title %}Добавить товар{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Добавить товар</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Название товара:</label>
            <input type="text" name="name" required value="{{ form.name.data if form.name.data else '' }}">
        </div>
        <div class="form-group">
            <label>Описание:</label>
            <textarea name="description" rows="4" required>{{ form.description.data if form.description.data else '' }}</textarea>
        </div>
        <div class="form-group">
            <label>Цена (₽):</label>
            <input type="number" name="price" step="0.01" required value="{{ form.price.data if form.price.data else '' }}">
        </div>
        <div class="form-group">
            <label>Категория:</label>
            <input type="text" name="category" placeholder="Пример: Смартфоны" value="{{ form.category.data if form.category.data else '' }}">
        </div>
        <div class="form-group">
            <label>Количество:</label>
            <input type="number" name="stock" value="{{ form.stock.data if form.stock.data else '1' }}" required>
        </div>
        <div class="form-group">
            <label>Изображения (можно несколько):</label>
            <input type="file" name="images" accept="image/*" multiple>
            <small>Вы можете выбрать несколько изображений. Первое будет главным.</small>
        </div>
        <button type="submit" class="btn btn-primary">Добавить товар</button>
        <a href="/" class="btn btn-warning">Отмена</a>
    </form>
</div>
{% endblock %}
